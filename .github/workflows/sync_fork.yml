name: Fork Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 00:00 UTC 执行（GitHub Actions schedule 使用 UTC）
  workflow_dispatch: # 允许手动触发

jobs:
  sync_with_upstream:
    name: Sync with Upstream
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream snapshot (exclude workflows)
        env:
          UPSTREAM_REPO: huangxd-/danmu_api
          UPSTREAM_BRANCH: main
          TARGET_BRANCH: main
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote get-url upstream >/dev/null 2>&1 || git remote add upstream "https://github.com/${UPSTREAM_REPO}.git"
          git fetch --prune upstream "${UPSTREAM_BRANCH}"

          git checkout "${TARGET_BRANCH}"

          LOCAL_SHA="$(git rev-parse HEAD)"
          UPSTREAM_SHA="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
          echo "local=${LOCAL_SHA}"
          echo "upstream=${UPSTREAM_SHA}"

          if [ "${LOCAL_SHA}" = "${UPSTREAM_SHA}" ]; then
            echo "Already up to date."
            exit 0
          fi

          # 只应用上游自共同祖先以来的非 workflow 变更，避免把上游 workflow 历史推回 fork。
          BASE_SHA="$(git merge-base HEAD "upstream/${UPSTREAM_BRANCH}")"
          if [ -z "${BASE_SHA}" ]; then
            echo "Failed to determine merge base with upstream."
            exit 1
          fi

          mapfile -d '' RESTORE_PATHS < <(
            git diff --name-only -z --diff-filter=ACMRT \
              "${BASE_SHA}" "upstream/${UPSTREAM_BRANCH}" -- \
              . ':(exclude).github/workflows'
          )

          mapfile -d '' DELETE_PATHS < <(
            git diff --name-only -z --diff-filter=D \
              "${BASE_SHA}" "upstream/${UPSTREAM_BRANCH}" -- \
              . ':(exclude).github/workflows'
          )

          if [ "${#RESTORE_PATHS[@]}" -eq 0 ] && [ "${#DELETE_PATHS[@]}" -eq 0 ]; then
            echo "No effective changes after excluding workflows."
            exit 0
          fi

          if [ "${#RESTORE_PATHS[@]}" -gt 0 ]; then
            git restore --source="upstream/${UPSTREAM_BRANCH}" --staged --worktree -- "${RESTORE_PATHS[@]}"
          fi

          if [ "${#DELETE_PATHS[@]}" -gt 0 ]; then
            git rm -f --ignore-unmatch -- "${DELETE_PATHS[@]}"
          fi

          if git diff --cached --quiet; then
            echo "No effective changes after excluding workflows."
            exit 0
          fi

          git commit -m "chore: sync upstream snapshot (exclude workflows)"
          git push origin "${TARGET_BRANCH}"
